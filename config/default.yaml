trading:
  kelly_fraction: 0.5
  min_edge_threshold: 0.05
  max_position_usd: 5.0
  total_bankroll_usd: 50.0
  max_portfolio_exposure: 0.5
  min_liquidity_usd: 500.0
  order_type: "GTC"
  price_tolerance: 0.005
  stale_order_timeout_seconds: 300
  daily_loss_limit_usd: 10.0
  max_event_exposure_pct: 0.30
  dry_run: false

lmsr:
  default_b: 100.0
  b_estimation_method: "order_book_fit"
  min_b: 10.0
  max_b: 10000.0
  use_fit_residual_confidence: true
  fit_residual_weight: 1.0
  max_b_bound_penalty: 0.10

bayesian:
  prior_yes: 0.50
  posterior_clamp_low: 0.20
  posterior_clamp_high: 0.80
  min_signals_to_trade: 2
  decay_interval_seconds: 300.0
  time_decay_alpha: 0.85
  min_signal_confidence: 0.20
  intra_group_decay: 0.15

kelly:
  min_confidence: 0.40
  kelly_short_dated: 0.25
  kelly_medium_dated: 0.33
  kelly_long_dated: 0.50
  short_dated_hours: 24.0
  medium_dated_hours: 72.0
  min_edge_threshold: 0.05
  min_edge_after_spread: 0.03
  max_position_usd: 5.0
  total_bankroll_usd: 50.0
  max_portfolio_exposure: 0.50

entry_liquidity:
  min_fill_coverage: 0.80
  max_slippage_pct: 0.05
  min_absolute_depth: 5.0
  check_exit_viability: true

signals:
  orderbook_imbalance:
    enabled: true
    sensitivity: 1.0
    min_depth_usd: 100.0
  lmsr_deviation:
    enabled: true
    min_deviation: 0.01
  volume:
    enabled: true
    lookback_trades: 50
  cross_market:
    enabled: true
    min_inconsistency: 0.05
    max_event_markets: 20
  whale_tracker:
    enabled: true
    whale_threshold_usd: 500.0
    volume_spike_multiplier: 3.0
    lookback_trades: 100
    min_whale_trades: 1
  related_market:
    enabled: true
    min_similarity: 0.3
    max_related: 5
    min_price_divergence: 0.10

exit:
  enabled: true
  stop_loss_pct: 0.15
  take_profit_pct: 0.15
  take_profit_sell_fraction: 0.50
  edge_floor_threshold: -0.05
  edge_floor_confidence_min: 0.40
  edge_convergence_threshold: 0.03
  edge_convergence_min_hold_s: 300
  min_exit_liquidity_pct: 0.80
  min_acceptable_bid_pct: 0.95
  max_hold_hours: 72.0
  emergency_floor_pct: 0.25
  exit_cooldown_seconds: 60.0
  check_interval_seconds: 30.0

scanner:
  rescan_interval_seconds: 300
  min_volume_24h_usd: 100.0
  min_liquidity_usd: 500.0
  min_hours_to_expiry: 24.0

feed:
  ws_reconnect_max_delay: 60
  rest_poll_interval_seconds: 30
  heartbeat_interval_seconds: 10

notifications:
  notify_on_trade: true
  notify_on_error: true
  notify_on_startup: true
  daily_summary_hour_utc: 0

weather:
  enabled: true
  min_edge: 0.08
  max_positions_per_city: 1
  min_hours_to_resolution: 6.0
  max_days_to_resolution: 3
  max_weather_exposure_pct: 0.40
  forecast_cache_ttl_seconds: 3600.0
  eval_interval_seconds: 300.0
  cities:
    - new-york
    - chicago
    - miami
    - los-angeles
    - houston
    - phoenix
    - denver
    - atlanta
    - dallas
    - san-francisco
    - seattle

logging:
  level: "INFO"
  format: "json"
  file: "logs/bot.log"
  max_bytes: 10485760
  backup_count: 5
