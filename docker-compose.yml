services:
  polymarket-bot:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "0.0.0.0:5050:5050"
    volumes:
      - shared-data:/app/data
      - bot-logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/')"]
      interval: 60s
      timeout: 10s
      retries: 3

  crypto-sniper:
    build:
      context: .
      dockerfile: services/crypto_sniper/Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - shared-data:/app/data
      - sniper-logs:/app/logs

volumes:
  shared-data:
  bot-logs:
  sniper-logs:
